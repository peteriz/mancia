name: Release

on:
  push:
    # Version tags, with or without a leading v (e.g. 0.0.2, v0.1.0).
    tags:
      - "[0-9]*"
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  build-and-publish-dmg:
    name: Build and publish DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Align bundle version with release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Support/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Support/Info.plist
          echo "Building Mancia $VERSION from tag $GITHUB_REF_NAME"

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Package DMG
        env:
          # Optional repo secrets, unset today: releases ship ad-hoc signed
          # (make_app.sh's fallback), which is this project's intended
          # default — users right-click > Open once; see the README's
          # Gatekeeper note. If a Developer ID identity is ever added,
          # setting these signs releases with it instead (the runner would
          # also need a keychain-import step first).
          CODESIGN_ID: ${{ secrets.CODESIGN_ID }}
          CODESIGN_FLAGS: ${{ secrets.CODESIGN_FLAGS }}
        run: make dmg

      # This repo has immutable releases: published releases reject asset
      # uploads. So the workflow owns the whole lifecycle — create a draft,
      # attach the DMG while still mutable, then publish. Never create or
      # publish releases by hand; just push a tag.
      - name: Create draft release with DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" build/Mancia-*.dmg \
            --draft \
            --title "Mancia ${GITHUB_REF_NAME#v}" \
            --generate-notes

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
