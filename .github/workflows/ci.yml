name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    # macos-15 is a stable GitHub-hosted label. Bump to macos-26 once that
    # runner is generally available if you want to match the macOS 26 toolchain.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest installed Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)"
          echo "Using $latest"
          sudo xcode-select -s "$latest"

      - name: Swift version
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: swift test
